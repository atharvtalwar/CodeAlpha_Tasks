<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ShopSpree</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">ShopSpree 🛒</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html">Products</a></li>
        </ul>
    </nav>

    <div class="login-container">
        <div class="form-box" id="login-form">
            <h2>Welcome Back</h2>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="Enter your email">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-pass" placeholder="Enter your password">
            </div>
            <button class="submit-btn" onclick="handleLogin()">Login</button>
            <p class="toggle-text">Don't have an account? <a onclick="toggleForm()">Sign Up</a></p>
        </div>

        <div class="form-box" id="signup-form" style="display: none;">
            <h2>Create Account</h2>
            <div class="input-group">
                <label>Name</label>
                <input type="text" id="signup-name" placeholder="Enter your name">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="signup-email" placeholder="Enter your email">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="signup-pass" placeholder="Create a password">
            </div>
            <button class="submit-btn" onclick="handleSignup()">Sign Up</button>
            <p class="toggle-text">Already have an account? <a onclick="toggleForm()">Login</a></p>
        </div>
    </div>

    <script>
        function toggleForm() {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
            }
        }

        async function handleSignup() {
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-pass').value;

            if (!name || !email || !password) return alert("Please fill all fields!");

            try {
                const response = await fetch('http://localhost:5000/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await response.json();
                alert(data.message);
                if (response.ok) toggleForm();
            } catch (error) {
                alert("Backend se connect nahi ho raha hai!");
            }
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;

            if (!email || !password) return alert("Please fill all fields!");

            try {
                const response = await fetch('http://localhost:5000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                alert(data.message);

                if (data.success) {
                    localStorage.setItem('user', JSON.stringify({ name: data.user.name, email: email }));
                    window.location.href = "index.html";
                }
            } catch (error) {
                alert("Backend se connect nahi ho raha hai!");
            }
        }
    </script>
</body>

</html>
