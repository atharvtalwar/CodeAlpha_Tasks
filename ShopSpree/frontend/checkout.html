<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - ShopSpree</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">ShopSpree 🛒</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html">Products</a></li>
        </ul>
    </nav>

    <div class="login-container">
        <div class="form-box">
            <h2>Order Checkout</h2>
            <p style="margin-bottom: 20px;">Please enter your delivery details to complete your order.</p>
            <div class="input-group">
                <label>Full Address</label>
                <input type="text" id="address" placeholder="123 Street, City">
            </div>
            <div class="input-group">
                <label>Phone Number</label>
                <input type="text" id="phone" placeholder="+91 XXXXX XXXXX">
            </div>
            <div class="input-group">
                <label>Payment Method</label>
                <input type="text" value="Cash on Delivery" disabled>
            </div>
            <button class="submit-btn" onclick="placeOrder()">Place Order</button>
        </div>
    </div>

    <script>
        async function placeOrder() {
            const user = localStorage.getItem('user');
            if (!user) return alert("Please Login first to place an order!");

            const userData = JSON.parse(user);
            const address = document.getElementById('address').value;
            const phone = document.getElementById('phone').value;

            if (!address || !phone) return alert("Please fill your delivery details!");

            try {
                const response = await fetch('http://localhost:5000/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userEmail: userData.email, address, phone })
                });

                const data = await response.json();
                if (data.success) {
                    alert(data.message);
                    window.location.href = "index.html";
                } else {
                    alert("Order failed!");
                }
            } catch (error) {
                alert("Backend connection error.");
            }
        }
    </script>
</body>

</html>
